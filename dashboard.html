<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>🌤 Weather Dashboard</h1>

        <button id="logoutBtn">Logout</button>
    </header>

    <!-- Search Section -->
    <section class="search-section">

        <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
        >

        <button id="searchBtn">
            Search
        </button>

    </section>

    <!-- Current Weather -->
    <section class="weather-card">

        <h2 id="cityName">City Name</h2>

        <img
            id="weatherIcon"
            src=""
            alt="Weather Icon"
        >

        <h1 id="temperature">--°C</h1>

        <p id="weatherCondition">
            Weather Condition
        </p>

        <div class="weather-info">

            <div class="info-box">
                <h3>Humidity</h3>
                <p id="humidity">--%</p>
            </div>

            <div class="info-box">
                <h3>Wind Speed</h3>
                <p id="windSpeed">-- km/h</p>
            </div>

        </div>

    </section>

    <!-- Forecast -->
    <section class="forecast">

        <h2>3-Day Forecast</h2>

        <div class="forecast-container">

            <div class="forecast-card">
                <h3 id="day1">Day 1</h3>
                <img id="icon1" src="" alt="">
                <p id="temp1">--°C</p>
            </div>

            <div class="forecast-card">
                <h3 id="day2">Day 2</h3>
                <img id="icon2" src="" alt="">
                <p id="temp2">--°C</p>
            </div>

            <div class="forecast-card">
                <h3 id="day3">Day 3</h3>
                <img id="icon3" src="" alt="">
                <p id="temp3">--°C</p>
            </div>

        </div>

    </section>

    <script src="dashboard.js"></script>

</body>
</html>
